        <nav>

    <h1>Bienvenido a ModaHub</h1>

    <p>
        Explorá tiendas, tendencias y ropa urbana.
    </p>

    <img src="imagenes/ropaurbana.png" width="350">

    <script>
        let usuario =
            localStorage.getItem(
                "usuarioModaHub"
            );

        if (usuario) {

            document.getElementById(
                    "sesion"
                ).innerHTML =
                "Sesión iniciada: " +
                usuario;

            document.getElementById(
                    "botonCerrar"
                ).innerHTML =
                '<button onclick="cerrarSesion()">Cerrar sesión</button>';

        }

        function cerrarSesion() {

            localStorage.removeItem(
                "usuarioModaHub"
            );

            location.reload();

        }
    </script>

</body>
